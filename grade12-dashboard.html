<script>
// ==================== GLOBAL STATE ====================
let totalXP = 0, gamesPlayed = 0, streak = 0;

let currentGame = null, activeGameState = null, timerInterval = null;

// ==================== BUILD GAMES FROM LIBRARY (Grade 12) ====================
const GRADE = 12;
const gradeData = GAME_LIBRARY[GRADE];
const GAMES = {};

for (let subjectKey in gradeData) {
  const subject = gradeData[subjectKey];
  subject.games.forEach(game => {
    const content = GAME_CONTENT[game.id];
    GAMES[game.id] = {
      id: game.id,
      name: game.name,
      desc: game.desc,
      emoji: subject.icon,
      xp: game.xp,
      color: subject.color,
      questions: content.questions
    };
  });
}

// ==================== API DATA LOADING ====================
async function loadUserData() {
  try {
    const user = await API.getUserProfile();
    totalXP = user.xp || 0;
    streak = user.streak || 0;
    gamesPlayed = user.gamesPlayed || 0;
    document.getElementById('userName').textContent = user.name || 'Student';
    
    const savedActivity = localStorage.getItem(`weeklyActivity_${GRADE}`);
    if (savedActivity) weeklyActivity = JSON.parse(savedActivity);
    
    updateStats();
  } catch (error) {
    console.error('Failed to load user data from API:', error);
    const saved = localStorage.getItem('grade12_data');
    if (saved) {
      let d = JSON.parse(saved);
      totalXP = d.xp || 0;
      gamesPlayed = d.games || 0;
      streak = d.streak || 0;
      weeklyActivity = d.activity || weeklyActivity;
    }
    updateStats();
  }
}

function updateStats() {
  document.getElementById('xpValue').textContent = totalXP;
  document.getElementById('gamesValue').textContent = gamesPlayed;
  document.getElementById('streakBadge').innerHTML = `🔥 ${streak} Day Streak`;
  localStorage.setItem('grade12_data', JSON.stringify({
    xp: totalXP, games: gamesPlayed, streak: streak, activity: weeklyActivity
  }));
}

async function addXP(amt) {
  totalXP += amt;
  updateStats();
  try {
    await API.updateUserProfile({ xp: totalXP });
  } catch (e) {
    console.warn('Sync XP failed:', e);
  }
}

// ==================== SECTION RENDERING ====================

    <div class="activity-day"><div class="activity-bar"><div class="activity-fill" style="height: ${(weeklyActivity[i]/maxAct)*50}px"></div></div><div class="activity-label">${day}</div></div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-value">4</div><div class="stat-label">Subjects</div></div>
      <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-value">Lv ${level}</div><div class="stat-label">Explorer Rank</div></div>
      <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-value">#1</div><div class="stat-label">Class Rank</div></div>
    </div>
    <div class="progress-section">
      <div class="progress-header"><span class="progress-title">LEVEL PROGRESS</span><span class="progress-stats">${totalXP} / ${level*900} XP to Lv ${level+1}</span></div>

}

function showPlay2Learn() {
  setActiveNav('Play2Learn');

  for (let id in GAMES) {

      <div class="game-desc">${g.desc}</div>
      <div class="game-xp">+${g.xp} XP</div>
    </div>`;
  }

  document.getElementById('contentArea').innerHTML = html;

function showTheory() {
  setActiveNav('Theory');
  let html = `<div class="notes-section"><div class="section-title">📘 FLIP THEORY (Tap to flip)</div><div class="flip-grid">`;
  flipNotes.forEach(note => {
    html += `<div class="flip-card" onclick="this.classList.toggle('flipped')"><div class="flip-inner"><div class="flip-front"><h4>📌 ${note.front}</h4></div><div class="flip-back">${note.back}</div></div></div>`;

async function showLeaderboard() {
  setActiveNav('Leaderboard');
  let html = `<div class="notes-section"><div class="section-title">🏆 GRADE 12 LEADERBOARD</div><table class="leaderboard-table"><tr><th>Rank</th><th>Student</th><th>XP</th></tr>`;

function setActiveNav(section) {
  const map = {'Dashboard':0,'Play2Learn':1,'Theory':2,'Leaderboard':3};
  document.querySelectorAll('.nav-item').forEach((item,idx)=> item.classList.toggle('active', idx===map[section]));
}

// ==================== GAME ENGINE (with API submission) ====================
function startGame(gameId) {
  currentGame = GAMES[gameId];
  if (!currentGame) { console.error("Game not found:", gameId); return; }
  document.getElementById('gameTitle').innerHTML = currentGame.name;
  document.getElementById('gameModal').classList.add('active');
  document.getElementById('gameScore').textContent = '0';
  if (activeGameState && activeGameState.timerInterval) clearInterval(activeGameState.timerInterval);
  activeGameState = {
    score: 0,
    qIndex: 0,
    questions: [...currentGame.questions],
    timeLeft: 80,
    canAnswer: true,
    timerInterval: null
  };
  updateGameScoreDisplay();
  startMCQGame();
}

function startMCQGame() {
  if (!activeGameState) return;
  if (activeGameState.timeLeft <= 0 || activeGameState.qIndex >= activeGameState.questions.length) {
    endMCQGame();
    return;
  }
  if (activeGameState.timerInterval) clearInterval(activeGameState.timerInterval);
  activeGameState.canAnswer = true;
  activeGameState.timeLeft = 80;
  document.getElementById('gameTimer').textContent = activeGameState.timeLeft;
  activeGameState.timerInterval = setInterval(() => {
    if (activeGameState) {
      activeGameState.timeLeft--;
      document.getElementById('gameTimer').textContent = activeGameState.timeLeft;
      if (activeGameState.timeLeft <= 0) {
        clearInterval(activeGameState.timerInterval);
        endMCQGame();
      }
    }
  }, 1000);
  renderCurrentQuestion();
}

function renderCurrentQuestion() {
  if (!activeGameState || activeGameState.qIndex >= activeGameState.questions.length) return;
  const q = activeGameState.questions[activeGameState.qIndex];
  const shuffled = [...q.options].sort(() => Math.random() - 0.5);
  document.getElementById('gameContent').innerHTML = `
    <div class="mcq-arena">
      <div class="mcq-timer">⏱️ ${activeGameState.timeLeft}s</div>
      <div class="mcq-question">${q.text}</div>
      <div class="mcq-options" id="mcqOptions">
        ${shuffled.map(opt => `<div class="mcq-option" data-value="${opt.replace(/"/g,'&quot;')}">${opt}</div>`).join('')}
      </div>
      <div class="mcq-progress">🔥 Q${activeGameState.qIndex+1}/${activeGameState.questions.length}</div>
    </div>
  `;
  document.querySelectorAll('.mcq-option').forEach(opt => {
    opt.addEventListener('click', function handler(e) {
      if (!activeGameState.canAnswer) return;
      const selected = this.dataset.value;
      const isCorrect = (selected === q.correct);
      if (isCorrect) {
        activeGameState.score += 25;
        showFeedback(`✅ CORRECT! +25 XP`, '#2ecc71');
        this.classList.add('correct-feedback');
      } else {
        showFeedback(`❌ WRONG! Answer: ${q.correct}. ${q.explanation}`, '#e84393');
        this.classList.add('wrong-feedback');
      }
      activeGameState.canAnswer = false;
      updateGameScoreDisplay();
      setTimeout(() => {
        activeGameState.qIndex++;
        if (activeGameState.qIndex < activeGameState.questions.length) {
          startMCQGame();
        } else {
          endMCQGame();
        }
      }, 1000);
      this.removeEventListener('click', handler);
    });
  });
}

function updateGameScoreDisplay() {
  if (activeGameState) document.getElementById('gameScore').textContent = activeGameState.score;
}

async function endMCQGame() {
  if (activeGameState && activeGameState.timerInterval) clearInterval(activeGameState.timerInterval);
  let earnedXP = Math.floor(currentGame.xp * (0.3 + Math.min(0.7, activeGameState.score / (activeGameState.questions.length * 25))));
  
  try {
    const result = await API.submitGameResult(currentGame.id, activeGameState.score, earnedXP);
    totalXP = result.xp;
    streak = result.streak;
    gamesPlayed = result.gamesPlayed || (gamesPlayed + 1);
  } catch (error) {
    console.error('Failed to submit game result:', error);
    totalXP += earnedXP;
    streak++;
    gamesPlayed++;
  }
  
  const today = new Date().getDay();
  const dayIndex = today === 0 ? 6 : today - 1;
  weeklyActivity[dayIndex] = (weeklyActivity[dayIndex] || 0) + 1;
  localStorage.setItem(`weeklyActivity_${GRADE}`, JSON.stringify(weeklyActivity));
  
  updateStats();
  
  document.getElementById('gameContent').innerHTML = `
    <div class="result-screen">
      <div class="result-emoji">${activeGameState.score >= 100 ? '🏆🔥 INSANE MASTER' : '📚 CHALLENGE COMPLETE'}</div>
      <div class="result-score">+${earnedXP} XP</div>
      <div>🏅 SCORE: ${activeGameState.score}/${activeGameState.questions.length * 25}</div>
      <button style="margin-top:25px; background:#2ecc71; border:none; padding:14px 32px; border-radius:40px; font-weight:bold; color:white; cursor:pointer" onclick="closeGame()">PLAY MORE →</button>
    </div>
  `;
  activeGameState = null;
}

function showFeedback(msg, color) {
  let fb = document.createElement('div');
  fb.textContent = msg;
  fb.style.position = 'fixed';
  fb.style.top = '30%';
  fb.style.left = '50%';
  fb.style.transform = 'translate(-50%, -50%)';
  fb.style.background = color;
  fb.style.color = 'white';
  fb.style.padding = '16px 28px';
  fb.style.borderRadius = '50px';
  fb.style.fontWeight = 'bold';
  fb.style.zIndex = '2000';
  fb.style.fontSize = '20px';
  document.body.appendChild(fb);
  setTimeout(() => fb.remove(), 800);
}

function closeGame() {
  if (activeGameState && activeGameState.timerInterval) clearInterval(activeGameState.timerInterval);
  document.getElementById('gameModal').classList.remove('active');
  activeGameState = null;
  showPlay2Learn();
}

function logout() {
  API.logout();
}

// ==================== INITIALIZE ====================
loadUserData().then(() => showDashboard());
</script>
