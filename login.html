<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>VNG LearnZoo — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* ... all existing styles remain exactly the same ... */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Space Grotesk', sans-serif;
  background: #05070f;
  color: #dde4f7;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow-x: hidden;
}

/* Animated background orbs */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 70% 60% at 20% 30%, rgba(91,143,255,0.08) 0%, transparent 60%),
              radial-gradient(ellipse 50% 50% at 80% 70%, rgba(169,124,255,0.06) 0%, transparent 55%);
  pointer-events: none;
  z-index: -1;
}

.login-container {
  width: 100%;
  max-width: 440px;
  background: rgba(9,13,26,0.9);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 28px;
  padding: 40px 32px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.4);
  transition: all 0.3s;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.logo-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, #5b8fff, #a97cff);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 8px 20px rgba(91,143,255,0.3);
}

.logo-text {
  font-family: 'Unbounded', sans-serif;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff, #7aa8ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.logo-sub {
  font-size: 12px;
  color: #4a5178;
  margin-left: 60px;
  margin-top: -4px;
  margin-bottom: 28px;
}

.tabs {
  display: flex;
  gap: 8px;
  background: #0d1224;
  padding: 5px;
  border-radius: 60px;
  margin-bottom: 28px;
}

.tab {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: #7a87a8;
  font-family: 'Unbounded', sans-serif;
  font-size: 13px;
  font-weight: 700;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.2s;
}

.tab.active {
  background: linear-gradient(135deg, #5b8fff, #7aa8ff);
  color: white;
  box-shadow: 0 4px 12px rgba(91,143,255,0.3);
}

.role-group {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}

.role-btn {
  flex: 1;
  padding: 12px 8px;
  background: #0d1224;
  border: 1.5px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.role-btn .emoji {
  font-size: 22px;
  display: block;
  margin-bottom: 6px;
}

.role-btn .name {
  font-size: 11px;
  font-weight: 700;
  font-family: 'Unbounded', sans-serif;
}

.role-btn.active {
  border-color: #5b8fff;
  background: rgba(91,143,255,0.1);
  transform: translateY(-2px);
}

.role-btn.active .name {
  color: #7aa8ff;
}

.grade-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}

.grade-btn {
  padding: 10px;
  background: #0d1224;
  border: 1.5px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  font-family: 'Unbounded', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #7a87a8;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.grade-btn.selected {
  border-color: #5b8fff;
  background: rgba(91,143,255,0.1);
  color: #7aa8ff;
  transform: scale(1.02);
}

.grade-label {
  font-size: 11px;
  font-weight: 700;
  color: #4a5178;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin-bottom: 10px;
  display: block;
}

.name-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

.input-group {
  margin-bottom: 18px;
}

.input-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: #4a5178;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  margin-bottom: 8px;
}

.input-group input {
  width: 100%;
  padding: 14px 16px;
  background: #0d1224;
  border: 1.5px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  color: #dde4f7;
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
}

.input-group input:focus {
  border-color: #5b8fff;
  background: rgba(91,143,255,0.05);
  box-shadow: 0 0 0 3px rgba(91,143,255,0.1);
}

.password-wrapper {
  position: relative;
}

.password-wrapper input {
  padding-right: 48px;
}

.toggle-password {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #4a5178;
  cursor: pointer;
  font-size: 16px;
}

.error-msg {
  background: rgba(255,80,80,0.1);
  border: 1px solid rgba(255,80,80,0.3);
  color: #ff7070;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  margin-bottom: 18px;
  display: none;
}

.error-msg.show {
  display: block;
  animation: shake 0.3s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.submit-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #5b8fff, #7aa8ff);
  border: none;
  border-radius: 14px;
  font-family: 'Unbounded', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 8px;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(91,143,255,0.4);
}

.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.switch-text {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: #4a5178;
}

.switch-text a {
  color: #7aa8ff;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
}

.switch-text a:hover {
  text-decoration: underline;
}

#nameFields {
  display: none;
}

/* Network status indicator */
.network-status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 16px;
  font-size: 12px;
  color: #4a5178;
}
.network-status.offline {
  color: #ff8c42;
}
.network-status.online {
  color: #00e5a8;
}

/* Grade-specific colors */
.grade-btn[data-grade="6"]:hover { border-color: #ff6b35; }
.grade-btn[data-grade="7"]:hover { border-color: #00d2ff; }
.grade-btn[data-grade="8"]:hover { border-color: #ff3d8c; }
.grade-btn[data-grade="9"]:hover { border-color: #9b59b6; }
.grade-btn[data-grade="10"]:hover { border-color: #2ecc71; }
.grade-btn[data-grade="11"]:hover { border-color: #f1c40f; }
.grade-btn[data-grade="12"]:hover { border-color: #e74c3c; }

.grade-btn[data-grade="6"].selected { border-color: #ff6b35; background: rgba(255,107,53,0.1); color: #ff6b35; }
.grade-btn[data-grade="7"].selected { border-color: #00d2ff; background: rgba(0,210,255,0.1); color: #00d2ff; }
.grade-btn[data-grade="8"].selected { border-color: #ff3d8c; background: rgba(255,61,140,0.1); color: #ff3d8c; }
.grade-btn[data-grade="9"].selected { border-color: #9b59b6; background: rgba(155,89,182,0.1); color: #9b59b6; }
.grade-btn[data-grade="10"].selected { border-color: #2ecc71; background: rgba(46,204,113,0.1); color: #2ecc71; }
.grade-btn[data-grade="11"].selected { border-color: #f1c40f; background: rgba(241,196,15,0.1); color: #f1c40f; }
.grade-btn[data-grade="12"].selected { border-color: #e74c3c; background: rgba(231,76,60,0.1); color: #e74c3c; }

@media (max-width: 480px) {
  .login-container { padding: 30px 20px; }
  .grade-grid { grid-template-columns: repeat(3, 1fr); }
  .logo-text { font-size: 20px; }
}
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <div class="logo-icon">🦁</div>
    <span class="logo-text">VNG LearnZoo</span>
  </div>
  <div class="logo-sub">Grades 6-12 · 112 Games · Descriptive MCQ</div>

  <!-- Network status indicator (added) -->
  <div id="networkStatus" class="network-status">
    <span id="networkIcon">📶</span>
    <span id="networkText">Checking connection...</span>
  </div>

  <div class="tabs">
    <button class="tab active" id="loginTab" onclick="switchTab('login')">Log In</button>
    <button class="tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div id="errorMsg" class="error-msg"></div>

  <!-- Role selection: Student and Teacher only -->
  <div class="role-group">
    <button class="role-btn active" id="studentRole" onclick="selectRole('student')">
      <span class="emoji">👩‍🎓</span>
      <span class="name">Student</span>
    </button>
    <button class="role-btn" id="teacherRole" onclick="selectRole('teacher')">
      <span class="emoji">👩‍🏫</span>
      <span class="name">Teacher</span>
    </button>
  </div>

  <!-- Name fields (only shown for Sign Up) -->
  <div id="nameFields">
    <div class="name-row">
      <div class="input-group">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="Arjun">
      </div>
      <div class="input-group">
        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="Kumar">
      </div>
    </div>
  </div>

  <!-- Grade selection (only shown for Students) -->
  <div id="gradeSection">
    <label class="grade-label">📚 Select Your Grade</label>
    <div class="grade-grid">
      <button class="grade-btn" data-grade="6" onclick="selectGrade(6, this)">Grade 6</button>
      <button class="grade-btn" data-grade="7" onclick="selectGrade(7, this)">Grade 7</button>
      <button class="grade-btn" data-grade="8" onclick="selectGrade(8, this)">Grade 8</button>
      <button class="grade-btn" data-grade="9" onclick="selectGrade(9, this)">Grade 9</button>
      <button class="grade-btn" data-grade="10" onclick="selectGrade(10, this)">Grade 10</button>
      <button class="grade-btn" data-grade="11" onclick="selectGrade(11, this)">Grade 11</button>
      <button class="grade-btn" data-grade="12" onclick="selectGrade(12, this)">Grade 12</button>
    </div>
    <div style="font-size: 11px; color: #4a5178; margin-top: 8px; text-align: center;">
      ⚡ Each grade has 16 unique games (4 subjects × 4 games)
    </div>
  </div>

  <div class="input-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="student@school.edu" value="demo@learnzoo.com">
  </div>

  <div class="input-group">
    <label>Password</label>
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="••••••••" value="demo123">
      <button class="toggle-password" onclick="togglePassword()" type="button">👁</button>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">🚀 Log In</button>

  <div class="switch-text" id="switchText">
    Don't have an account? <a onclick="switchTab('signup')">Sign Up Free</a>
  </div>
</div>

<!-- Include the offline-ready API service module -->
<script src="api.js"></script>
<script>
// ============================================
// LOGIN PAGE – OFFLINE-READY
// ============================================

let currentRole = 'student';
let selectedGrade = 6;
let currentTab = 'login';

// Network status UI update
function updateNetworkStatus() {
  const statusEl = document.getElementById('networkStatus');
  const iconEl = document.getElementById('networkIcon');
  const textEl = document.getElementById('networkText');
  if (navigator.onLine) {
    statusEl.className = 'network-status online';
    iconEl.textContent = '🌐';
    textEl.textContent = 'Online – syncing enabled';
  } else {
    statusEl.className = 'network-status offline';
    iconEl.textContent = '📴';
    textEl.textContent = 'Offline – local mode active';
  }
}
window.addEventListener('online', updateNetworkStatus);
window.addEventListener('offline', updateNetworkStatus);
updateNetworkStatus();

// Default select Grade 6
document.addEventListener('DOMContentLoaded', function() {
  const grade6Btn = document.querySelector('.grade-btn[data-grade="6"]');
  if (grade6Btn) grade6Btn.classList.add('selected');
});

function switchTab(tab) {
  currentTab = tab;
  
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
  
  document.getElementById('nameFields').style.display = tab === 'signup' ? 'block' : 'none';
  
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.textContent = tab === 'login' ? '🚀 Log In' : '🚀 Create Account';
  
  const switchText = document.getElementById('switchText');
  if (tab === 'login') {
    switchText.innerHTML = `Don't have an account? <a onclick="switchTab('signup')">Sign Up Free</a>`;
  } else {
    switchText.innerHTML = `Already have an account? <a onclick="switchTab('login')">Log In</a>`;
  }
  
  hideError();
}

function selectRole(role) {
  currentRole = role;
  
  document.getElementById('studentRole').classList.toggle('active', role === 'student');
  document.getElementById('teacherRole').classList.toggle('active', role === 'teacher');
  
  // Show grade selector only for students
  document.getElementById('gradeSection').style.display = role === 'student' ? 'block' : 'none';
}

function selectGrade(grade, element) {
  selectedGrade = grade;
  
  document.querySelectorAll('.grade-btn').forEach(btn => btn.classList.remove('selected'));
  element.classList.add('selected');
}

function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function showError(message) {
  const errorDiv = document.getElementById('errorMsg');
  errorDiv.textContent = message;
  errorDiv.classList.add('show');
  setTimeout(() => errorDiv.classList.remove('show'), 4000);
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

// ============================================
// HANDLE LOGIN / SIGNUP VIA API (with offline awareness)
// ============================================
async function handleSubmit() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  
  if (!email) {
    showError('⚠️ Please enter your email.');
    return;
  }
  
  if (!password || password.length < 4) {
    showError('⚠️ Password must be at least 4 characters.');
    return;
  }
  
  if (currentRole === 'student' && !selectedGrade) {
    showError('⚠️ Please select your grade.');
    return;
  }
  
  hideError();
  
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  
  // Show appropriate loading text based on network
  const loadingText = navigator.onLine ? '⏳ Connecting...' : '📴 Offline login...';
  submitBtn.textContent = loadingText;
  
  try {
    let user;
    
    if (currentTab === 'login') {
      user = await API.login(email, password, currentRole, currentRole === 'student' ? selectedGrade : undefined);
    } else {
      const firstName = document.getElementById('firstName')?.value.trim() || '';
      const lastName = document.getElementById('lastName')?.value.trim() || '';
      const fullName = lastName ? `${firstName} ${lastName}` : firstName || 'Student';
      
      if (!fullName) {
        showError('⚠️ Please enter your name.');
        submitBtn.disabled = false;
        submitBtn.textContent = '🚀 Create Account';
        return;
      }
      
      user = await API.signup(fullName, email, password, currentRole, currentRole === 'student' ? selectedGrade : undefined);
    }
    
    // Redirect based on role
    if (user.role === 'teacher') {
      window.location.href = 'staff-dashboard.html';
    } else {
      const dashboardMap = {
        6: 'grade6-dashboard.html',
        7: 'grade7-dashboard.html',
        8: 'grade8-dashboard.html',
        9: 'grade9-dashboard.html',
        10: 'grade10-dashboard.html',
        11: 'grade11-dashboard.html',
        12: 'grade12-dashboard.html'
      };
      const targetPage = dashboardMap[user.grade] || 'grade6-dashboard.html';
      window.location.href = targetPage;
    }
  } catch (error) {
    // Enhanced error messaging for offline scenarios
    let errorMsg = error.message;
    if (!navigator.onLine) {
      if (currentTab === 'login') {
        errorMsg = '📴 You are offline. Login will work only if you have logged in before on this device.';
      } else {
        errorMsg = '📴 You are offline. Signing up will create a local account that syncs later.';
      }
    } else if (error.message.includes('offline') || error.message.includes('Failed to fetch')) {
      errorMsg = '⚠️ Network issue. Trying offline mode...';
    }
    showError(`❌ ${errorMsg}`);
    submitBtn.disabled = false;
    submitBtn.textContent = currentTab === 'login' ? '🚀 Log In' : '🚀 Create Account';
  }
}
</script>
</body>
</html>
