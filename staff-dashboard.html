<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>VNG LearnZoo — Staff Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ========== GLOBAL VARIABLES (Matches Student Dashboard) ========== */
:root {
  --bg: #0a0c15;
  --surface: #0d1020;
  --card: #12162a;
  --card2: #181e35;
  --card3: #1f2642;
  --bdr: rgba(255,255,255,0.06);
  --bdr2: rgba(255,255,255,0.12);
  --txt: #e8edff;
  --muted: #4a5178;
  --soft: #8b93b8;
  --purple: #9b6dff;
  --pink: #f472b6;
  --teal: #00ddb8;
  --blue: #4b9eff;
  --yellow: #ffcc00;
  --red: #f87171;
  --green: #4ade80;
  --orange: #fb923c;
  --gold: #ffd700;
  --font-display: 'Outfit', sans-serif;
  --r: 20px;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
}
body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--font-display);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
}
/* ========== SIDEBAR ========== */
.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--bdr);
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 20;
}
.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.logo-text {
  font-weight: 800;
  font-size: 1.2rem;
  background: linear-gradient(90deg, var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.grade-picker-wrap {
  padding: 16px 16px 8px;
}
.grade-picker-label {
  font-size: 10px;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
  display: block;
}
.grade-pills-sb {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.gp {
  padding: 8px 4px;
  border-radius: 10px;
  border: 1.5px solid var(--bdr);
  background: transparent;
  color: var(--soft);
  font-weight: 700;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.gp:hover {
  border-color: var(--purple);
  color: var(--txt);
}
.gp.sel {
  border-color: var(--purple);
  background: rgba(155,109,255,0.12);
  color: var(--purple);
}
.nav-menu {
  flex: 1;
  padding: 16px 12px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 14px;
  cursor: pointer;
  color: var(--soft);
  font-weight: 700;
  transition: all 0.2s;
  margin-bottom: 4px;
}
.nav-item:hover, .nav-item.active {
  background: rgba(155,109,255,0.12);
  color: var(--purple);
}
.nav-icon {
  font-size: 20px;
  width: 24px;
}
.nav-badge {
  margin-left: auto;
  background: rgba(248,113,113,0.15);
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  color: var(--red);
}
.user-info {
  padding: 16px;
  border-top: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-avatar {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
}
.user-details {
  flex: 1;
}
.user-name {
  font-weight: 800;
  font-size: 14px;
}
.user-role {
  font-size: 11px;
  color: var(--muted);
}
.logout-btn {
  margin-top: auto;
  padding: 12px;
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  color: var(--red);
  font-weight: 700;
  transition: 0.2s;
}
.logout-btn:hover {
  background: rgba(248,113,113,0.2);
}
/* ========== MAIN CONTENT ========== */
.main-content {
  flex: 1;
  margin-left: 280px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.top-bar {
  background: rgba(10,12,21,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--bdr);
  padding: 14px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 10;
}
.page-title {
  font-weight: 800;
  font-size: 20px;
}
.grade-indicator {
  background: rgba(155,109,255,0.15);
  padding: 5px 14px;
  border-radius: 40px;
  font-size: 12px;
  font-weight: 800;
  color: var(--purple);
  margin-left: 12px;
}
.xp-panel {
  display: flex;
  gap: 12px;
}
.badge-icon {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--bdr);
  padding: 6px 14px;
  border-radius: 40px;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}
.badge-icon.alert {
  background: rgba(248,113,113,0.1);
  border-color: rgba(248,113,113,0.2);
  color: var(--red);
  cursor: pointer;
}
.badge-icon.class {
  background: rgba(155,109,255,0.1);
  border-color: rgba(155,109,255,0.2);
  color: var(--purple);
}
/* ========== CONTENT SECTIONS ========== */
.content-area {
  padding: 28px;
  flex: 1;
}
.section {
  display: none;
  animation: fadeIn 0.3s ease;
}
.section.active {
  display: block;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
/* Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 28px;
}
.stat-card {
  background: linear-gradient(135deg, var(--card), var(--card2));
  border: 1px solid var(--bdr);
  border-radius: 20px;
  padding: 20px;
}
.stat-icon { font-size: 28px; margin-bottom: 10px; }
.stat-value { font-size: 36px; font-weight: 800; color: var(--gold); line-height: 1; }
.stat-label { font-size: 12px; color: var(--soft); margin-top: 5px; }
.stat-trend { font-size: 11px; margin-top: 8px; display: inline-block; padding: 2px 8px; border-radius: 20px; background: rgba(74,222,128,0.1); color: var(--green); }
/* Subject Performance Bars */
.perf-bars {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 20px;
  padding: 20px;
}
.perf-item {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.perf-name {
  width: 80px;
  font-weight: 700;
  font-size: 13px;
}
.perf-bar {
  flex: 1;
  height: 8px;
  background: var(--card3);
  border-radius: 10px;
  overflow: hidden;
}
.perf-fill {
  height: 100%;
  border-radius: 10px;
}
.perf-percent {
  width: 40px;
  text-align: right;
  font-size: 13px;
  font-weight: 700;
}
/* Two Column Layout */
.two-col {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 20px;
  margin-bottom: 28px;
}
.two-col-equal {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 28px;
}
/* At-Risk Box */
.atrisk-box {
  background: var(--card);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 20px;
  padding: 20px;
}
.atrisk-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}
.atrisk-header h3 { font-size: 16px; color: var(--red); }
.atrisk-badge {
  background: rgba(248,113,113,0.12);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  color: var(--red);
}
.atrisk-item {
  background: rgba(248,113,113,0.05);
  border: 1px solid rgba(248,113,113,0.1);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 10px;
}
.atrisk-name {
  font-weight: 800;
  font-size: 13px;
}
.atrisk-reason {
  font-size: 11px;
  color: var(--red);
  margin-top: 4px;
}
/* Quest & Quiz Cards */
.quest-grid, .quiz-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.qz-card {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 18px;
  padding: 18px;
  transition: all 0.2s;
}
.qz-card:hover {
  border-color: var(--purple);
  transform: translateY(-2px);
}
.qz-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
}
.qz-icon { font-size: 28px; }
.qz-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
}
.qz-title { font-weight: 800; font-size: 15px; margin-bottom: 5px; }
.qz-meta { font-size: 12px; color: var(--soft); margin-bottom: 12px; }
.qz-actions {
  display: flex;
  gap: 8px;
}
.qz-btn {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: 0.2s;
}
/* Leaderboard */
.leaderboard-list {
  max-width: 600px;
}
.lb-item {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 16px;
  padding: 12px 16px;
  margin-bottom: 10px;
}
.lb-rank {
  font-size: 20px;
  font-weight: 800;
  width: 40px;
}
.lb-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
}
.lb-info { flex: 1; }
.lb-name { font-weight: 800; font-size: 14px; }
.lb-xp { font-weight: 800; color: var(--gold); }
/* Buttons */
.btn {
  padding: 8px 16px;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  font-family: inherit;
}
.btn-primary {
  background: linear-gradient(135deg, var(--purple), #8b5cf6);
  color: white;
}
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--bdr);
  color: var(--soft);
}
.btn-outline:hover {
  border-color: var(--purple);
  color: var(--purple);
}
/* Table */
.student-table {
  width: 100%;
  border-collapse: collapse;
}
.student-table th {
  text-align: left;
  padding: 10px 8px;
  font-size: 11px;
  font-weight: 800;
  color: var(--muted);
  border-bottom: 1px solid var(--bdr);
}
.student-table td {
  padding: 12px 8px;
  font-size: 13px;
  font-weight: 600;
  border-bottom: 1px solid var(--bdr);
}
.student-table tr:hover {
  background: rgba(255,255,255,0.02);
  cursor: pointer;
}
.search-input {
  background: var(--card2);
  border: 1px solid var(--bdr);
  border-radius: 40px;
  padding: 8px 14px;
  color: var(--txt);
  font-family: inherit;
  width: 200px;
  outline: none;
}
/* Loading spinner */
.loading-spinner {
  text-align: center;
  padding: 60px;
  font-size: 18px;
  color: var(--soft);
}
/* Responsive */
@media (max-width: 768px) {
  .sidebar { width: 70px; }
  .sidebar .logo-text, .sidebar .grade-picker-label, .sidebar .gp span, .sidebar .nav-item span:last-child, .sidebar .user-details { display: none; }
  .main-content { margin-left: 70px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .two-col, .two-col-equal { grid-template-columns: 1fr; }
  .quest-grid, .quiz-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">🦁</div>
    <div class="logo-text">VNG LearnZoo</div>
  </div>
  <div class="grade-picker-wrap">
    <div class="grade-picker-label">📌 Select Class</div>
    <div class="grade-pills-sb" id="gradePills">
      <button class="gp" data-grade="6">Gr 6</button>
      <button class="gp" data-grade="7">Gr 7</button>
      <button class="gp" data-grade="8">Gr 8</button>
      <button class="gp" data-grade="9">Gr 9</button>
      <button class="gp" data-grade="10">Gr 10</button>
      <button class="gp" data-grade="11">Gr 11</button>
      <button class="gp" data-grade="12">Gr 12</button>
    </div>
  </div>
  <div class="nav-menu">
    <div class="nav-item active" data-section="dashboard">
      <span class="nav-icon">🏠</span> <span>Dashboard</span>
    </div>
    <div class="nav-item" data-section="students">
      <span class="nav-icon">👩‍🎓</span> <span>Students</span>
      <span class="nav-badge" id="stuCountBadge">0</span>
    </div>
    <div class="nav-item" data-section="atrisk">
      <span class="nav-icon">🚨</span> <span>At-Risk</span>
      <span class="nav-badge" id="atriskCountBadge">0</span>
    </div>
    <div class="nav-item" data-section="quests">
      <span class="nav-icon">⚔️</span> <span>Quest Builder</span>
    </div>
    <div class="nav-item" data-section="quiz">
      <span class="nav-icon">🧩</span> <span>Quiz Editor</span>
    </div>
    <div class="nav-item" data-section="leaderboard">
      <span class="nav-icon">🏆</span> <span>Leaderboard</span>
    </div>
  </div>
  <div class="user-info">
    <div class="user-avatar" id="teacherInitials">PS</div>
    <div class="user-details">
      <div class="user-name" id="teacherName">Ms. Priya S.</div>
      <div class="user-role">Teacher · Grade 6-12</div>
    </div>
  </div>
  <div class="logout-btn" onclick="logout()">🚪 Log Out</div>
</div>

<div class="main-content">
  <div class="top-bar">
    <div class="page-title">
      Staff Dashboard
      <span class="grade-indicator" id="gradeIndicator">No Grade Selected</span>
    </div>
    <div class="xp-panel">
      <div class="badge-icon alert" id="alertBadge" onclick="switchSection('atrisk')">🚨 0 At-Risk</div>
      <div class="badge-icon class" id="classBadge">👩‍🎓 0 Students</div>
    </div>
  </div>
  <div class="content-area" id="contentArea">
    <!-- Dynamic content loaded via JS -->
  </div>
</div>

<!-- API Service -->
<script src="api.js"></script>
<script>
// ========== GLOBAL STATE ==========
let currentGrade = null;
let currentData = null;        // { subjects: [], students: [], stats: {} }
let allStudents = [];
let teacherInfo = null;

// ========== DOM ELEMENTS ==========
const gradeBtns = document.querySelectorAll('.gp');
const navItems = document.querySelectorAll('.nav-item');
let activeSection = 'dashboard';

// ========== INITIALIZATION ==========
async function init() {
  // Load teacher profile
  try {
    teacherInfo = await API.getUserProfile();
    document.getElementById('teacherName').textContent = teacherInfo.name;
    document.getElementById('teacherInitials').textContent = teacherInfo.name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
  } catch (e) {
    console.warn('Could not load teacher profile');
  }
  
  // Add click handlers for grade buttons
  gradeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const grade = parseInt(btn.dataset.grade);
      selectGrade(grade);
    });
  });
  
  // Add click handlers for nav items
  navItems.forEach(item => {
    item.addEventListener('click', () => {
      const section = item.dataset.section;
      if (section) switchSection(section);
    });
  });
  
  // Default: no grade selected – show empty state
  showEmptyState();
}

async function selectGrade(grade) {
  currentGrade = grade;
  
  // Update UI to show selected grade
  gradeBtns.forEach(btn => {
    btn.classList.toggle('sel', parseInt(btn.dataset.grade) === grade);
  });
  document.getElementById('gradeIndicator').innerHTML = `Grade ${grade} · Loading...`;
  
  // Show loading state
  document.getElementById('contentArea').innerHTML = `<div class="loading-spinner">⏳ Loading Grade ${grade} data...</div>`;
  
  try {
    // Fetch class stats and students in parallel
    const [stats, students] = await Promise.all([
      API.getClassStats(grade),
      API.getTeacherStudents(grade)
    ]);
    
    // Transform subjects data for UI
    const subjects = [
      { id: 'math', name: 'Mathematics', ico: '∑', color: '#00ddb8' },
      { id: 'science', name: 'Science', ico: '🔬', color: '#fb923c' },
      { id: 'tamil', name: 'Tamil', ico: 'அ', color: '#9b6dff' },
      { id: 'english', name: 'English', ico: '📝', color: '#4b9eff' }
    ];
    
    // Merge stats into subjects
    const enrichedSubjects = subjects.map(sub => ({
      ...sub,
      avg: stats.subjects?.find(s => s.id === sub.id)?.avg || 0
    }));
    
    currentData = {
      subjects: enrichedSubjects,
      students: students,
      stats: stats
    };
    allStudents = students;
    
    // Update badges
    const atRiskCount = stats.atRiskCount || 0;
    document.getElementById('alertBadge').innerHTML = `🚨 ${atRiskCount} At-Risk`;
    document.getElementById('classBadge').innerHTML = `👩‍🎓 ${students.length} Students`;
    document.getElementById('stuCountBadge').innerText = students.length;
    document.getElementById('atriskCountBadge').innerText = atRiskCount;
    document.getElementById('gradeIndicator').innerHTML = `Grade ${grade}`;
    
    // Render current section
    renderCurrentSection();
  } catch (error) {
    console.error('Failed to load grade data:', error);
    document.getElementById('contentArea').innerHTML = `
      <div style="text-align:center; padding:80px 20px;">
        <div style="font-size:64px; margin-bottom:16px;">⚠️</div>
        <h2 style="margin-bottom:8px;">Failed to Load Data</h2>
        <p style="color:var(--soft);">${error.message || 'Please try again later.'}</p>
        <button class="btn btn-outline" style="margin-top:20px;" onclick="selectGrade(${grade})">🔄 Retry</button>
      </div>
    `;
  }
}

function showEmptyState() {
  document.getElementById('contentArea').innerHTML = `
    <div style="text-align:center; padding:80px 20px;">
      <div style="font-size:64px; margin-bottom:16px;">🏫</div>
      <h2 style="margin-bottom:8px;">Select a Grade to Begin</h2>
      <p style="color:var(--soft);">Choose a grade from the sidebar to see students, subjects, and performance.</p>
    </div>
  `;
}

function switchSection(section) {
  activeSection = section;
  navItems.forEach(item => {
    item.classList.toggle('active', item.dataset.section === section);
  });
  if (currentGrade && currentData) renderCurrentSection();
  else if (!currentGrade) showEmptyState();
}

function renderCurrentSection() {
  if (!currentGrade || !currentData) return;
  if (activeSection === 'dashboard') renderDashboard();
  else if (activeSection === 'students') renderStudents();
  else if (activeSection === 'atrisk') renderAtRisk();
  else if (activeSection === 'quests') renderQuests();
  else if (activeSection === 'quiz') renderQuiz();
  else if (activeSection === 'leaderboard') renderLeaderboard();
}

// ========== RENDER DASHBOARD ==========
function renderDashboard() {
  const stats = currentData.stats;
  const students = currentData.students;
  const subjects = currentData.subjects;
  
  const totalStudents = students.length;
  const avgXP = stats.avgXP || Math.round(students.reduce((a,s) => a + (s.xp||0), 0) / totalStudents) || 0;
  const avgScore = Math.round(subjects.reduce((a,s) => a + s.avg, 0) / subjects.length) || 0;
  const atRiskCount = stats.atRiskCount || students.filter(s => s.streak === 0).length;
  
  const statsHtml = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">👩‍🎓</div><div class="stat-value">${totalStudents}</div><div class="stat-label">Students</div><div class="stat-trend">Grade ${currentGrade}</div></div>
      <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-value">${avgScore}%</div><div class="stat-label">Class Avg Score</div><div class="stat-trend">Based on available data</div></div>
      <div class="stat-card"><div class="stat-icon">🚨</div><div class="stat-value">${atRiskCount}</div><div class="stat-label">At-Risk</div><div class="stat-trend">⚠ Needs attention</div></div>
      <div class="stat-card"><div class="stat-icon">⚡</div><div class="stat-value">${(avgXP/100).toFixed(1)}k</div><div class="stat-label">Avg XP</div><div class="stat-trend">Class average</div></div>
    </div>
  `;
  
  const perfBars = subjects.map(sub => `
    <div class="perf-item">
      <div class="perf-name">${sub.name}</div>
      <div class="perf-bar"><div class="perf-fill" style="width:${sub.avg}%; background:${sub.color}"></div></div>
      <div class="perf-percent">${sub.avg}%</div>
    </div>
  `).join('');
  
  const atRiskStudents = students.filter(s => s.streak === 0).slice(0, 3);
  const atRiskHtml = atRiskStudents.map(s => `
    <div class="atrisk-item">

    </div>
  `).join('') || '<div style="text-align:center; color:var(--soft);">✅ No at-risk students</div>';
  
  const topPerformers = [...students].sort((a,b) => (b.xp||0) - (a.xp||0)).slice(0, 3);
  const topHtml = topPerformers.map((s,i) => `
    <div style="display:flex; align-items:center; gap:10px; background:var(--card2); border-radius:14px; padding:10px; margin-bottom:8px;">
      <span style="font-size:20px;">${i===0?'🥇':i===1?'🥈':'🥉'}</span>
      <div><div style="font-weight:800;">${s.name}</div><div style="font-size:11px; color:var(--soft);">${(s.xp||0).toLocaleString()} XP</div></div>
    </div>
  `).join('') || '<div style="color:var(--soft);">No students yet</div>';
  
  const questsHtml = subjects.map(sub => `
    <div class="qz-card" style="margin-bottom:10px;">
      <div class="qz-header"><span class="qz-icon">${sub.ico}</span><span class="qz-tag" style="background:${sub.color}22; color:${sub.color}">${sub.name}</span></div>
      <div class="qz-title">${sub.name} Quest</div>
      <div class="qz-meta">${Math.floor(totalStudents * 0.7)}/${totalStudents} completed</div>
      <div class="qz-actions"><button class="qz-btn btn-outline" onclick="alert('Edit ${sub.name} quest')">✏️ Edit</button></div>
    </div>
  `).join('');
  
  const html = `
    ${statsHtml}
    <div class="two-col">
      <div class="perf-bars"><h3 style="margin-bottom:12px;">📊 Subject Performance</h3>${perfBars}</div>
      <div class="atrisk-box"><div class="atrisk-header"><h3>🚨 At-Risk Students</h3><div class="atrisk-badge">${atRiskCount} flagged</div></div>${atRiskHtml}</div>
    </div>
    <div class="two-col-equal">
      <div class="perf-bars"><h3 style="margin-bottom:12px;">🏆 Top Performers</h3>${topHtml}</div>
      <div class="perf-bars"><h3 style="margin-bottom:12px;">⚔️ Active Quests</h3>${questsHtml}</div>
    </div>
  `;
  document.getElementById('contentArea').innerHTML = html;
}

  const subjects = currentData.subjects;
  
  const subjHeaders = subjects.map(s => `<th>${s.ico} ${s.name}</th>`).join('');
  const rows = filtered.map(s => {
    const status = s.streak === 0 ? 'atrisk' : 'active';
    const statusText = status === 'active' ? 'Active ✓' : 'At-Risk 🚨';
    const subjCells = subjects.map(sub => {
      const pct = s.subjects?.[sub.id] || 0;
      return `<td><div style="display:flex; align-items:center; gap:6px;"><div style="width:40px; height:4px; background:var(--card3); border-radius:2px; overflow:hidden;"><div style="width:${pct}%; height:100%; background:${sub.color};"></div></div><span style="font-size:12px;">${pct}%</span></div></td>`;

    return `<tr onclick="viewStudentDetail('${s._id}')">

      <td style="color:var(--gold); font-weight:800;">${(s.xp||0).toLocaleString()}</td>

// ========== VIEW STUDENT DETAIL ==========
function viewStudentDetail(studentId) {
  const student = currentData.students.find(s => s._id === studentId);
  if (!student) return;
  
  const level = Math.floor((student.xp||0) / 500) + 1;
  const subjects = currentData.subjects;
  
  const subjBars = subjects.map(sub => {
    const pct = student.subjects?.[sub.id] || 0;
    return `<div style="margin-bottom:12px;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;"><span>${sub.ico}</span><span style="color:${sub.color}">${sub.name}</span></div>
      <div style="display:flex; align-items:center; gap:10px;"><div style="flex:1; height:6px; background:var(--card3); border-radius:3px; overflow:hidden;"><div style="width:${pct}%; height:100%; background:${sub.color};"></div></div><span style="font-size:13px; font-weight:700;">${pct}%</span></div>
    </div>`;
  }).join('');
  
  const html = `
    <button class="btn btn-outline" onclick="renderStudents()" style="margin-bottom:16px;">← Back to Students</button>
    <div style="background:var(--card); border-radius:20px; padding:24px;">
      <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
        <div style="width:80px; height:80px; border-radius:50%; background:${getAvatarColor(student.name)}; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:800;">${student.name.charAt(0)}</div>
        <div><h2>${student.name}</h2><p>${student.email || ''} · Grade ${currentGrade} · Level ${level}</p><div style="display:flex; gap:8px; margin-top:8px;"><span style="background:rgba(255,204,0,0.1); padding:4px 12px; border-radius:20px;">🔥 ${student.streak||0} day streak</span><span style="background:rgba(0,221,184,0.1); padding:4px 12px; border-radius:20px;">⚡ ${(student.xp||0).toLocaleString()} XP</span></div></div>
        <button class="btn btn-primary" onclick="nudgeStudent('${student._id}', '${student.name}')">📩 Send Nudge</button>
      </div>
      <div style="margin-top:24px;"><h3>📚 Subject Performance</h3><div style="margin-top:16px;">${subjBars}</div></div>
    </div>
  `;
  document.getElementById('contentArea').innerHTML = html;
}

  const reasons = ['⚠ No activity for 5+ days', '📉 Streak broken', '⚔ Missed daily quests', '📚 Below 25% progress'];
  const html = `

    <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:16px;">

// ========== UTILITIES ==========
function getAvatarColor(name) {
  const colors = ['#7c3aed','#059669','#b45309','#0891b2','#9333ea','#dc2626','#2563eb','#c026d3'];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

async function nudgeStudent(studentId, studentName) {
  try {
    await API.sendNudge(studentId, `Keep up the great work, ${studentName.split(' ')[0]}! Your teacher is cheering for you! 🦁🚀`);
    alert(`📩 Nudge sent to ${studentName}!`);
  } catch (error) {
    alert(`❌ Failed to send nudge: ${error.message}`);
  }
}
