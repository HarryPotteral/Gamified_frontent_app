<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VNG LearnZoo — Grade 9 • INSANE MODE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* … all existing CSS remains unchanged … */
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',sans-serif;background:#0a0c15;color:#e8edff;min-height:100vh;overflow-x:hidden}
.dashboard-container{display:flex;min-height:100vh}
.sidebar{width:280px;background:#0d1020;border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;position:fixed;height:100vh;overflow-y:auto;z-index:10}
.sidebar-header{display:flex;align-items:center;gap:12px;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sidebar-logo{width:44px;height:44px;background:linear-gradient(135deg,#e74c3c,#c0392b);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.user-info{background:#12162a;border-radius:16px;padding:16px;margin-bottom:24px;text-align:center}
.user-avatar{width:56px;height:56px;background:linear-gradient(135deg,#e74c3c,#c0392b);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px}
.stat-value{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:800;color:#ffd700}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;cursor:pointer;color:#8b93b8;transition:all 0.2s;margin-bottom:4px}
.nav-item.active,.nav-item:hover{background:rgba(231,76,60,0.15);color:#e74c3c}
.logout-btn{margin-top:32px;padding:12px;background:rgba(255,71,87,0.1);border-radius:12px;text-align:center;cursor:pointer;color:#ff4757}
.main-content{flex:1;margin-left:280px;padding:24px 32px}
.top-bar{display:flex;justify-content:space-between;margin-bottom:32px;align-items:center;flex-wrap:wrap;gap:15px}
.page-title{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ff8c5a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.streak-badge{background:rgba(255,215,0,0.15);padding:8px 18px;border-radius:40px;font-weight:700;color:#ffd700}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:32px}
.stat-card{background:linear-gradient(135deg,#12162a,#181e35);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:20px}
.stat-icon{font-size:28px;margin-bottom:12px}
.stat-card .stat-value{font-family:'Unbounded',sans-serif;font-size:32px;font-weight:800;color:#ffd700}
.stat-label{font-size:12px;color:#8b93b8;margin-top:4px}
.progress-section{background:linear-gradient(135deg,#12162a,#181e35);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:20px;margin-bottom:32px}
.progress-header{display:flex;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.progress-title{font-weight:800;font-size:16px}
.progress-stats{color:#ffd700;font-size:14px}
.progress-bar{height:10px;background:#1f2642;border-radius:10px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;background:linear-gradient(90deg,#e74c3c,#c0392b);border-radius:10px;width:0%}
.weekly-activity{margin-top:20px}
.weekly-title{font-size:13px;color:#8b93b8;margin-bottom:12px}
.activity-bars{display:flex;gap:12px;justify-content:space-between}
.activity-day{flex:1;text-align:center}
.activity-bar{height:60px;background:#1f2642;border-radius:8px;margin-bottom:6px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.activity-fill{background:linear-gradient(180deg,#e74c3c,#c0392b);border-radius:8px}
.activity-label{font-size:10px;color:#8b93b8}
.notes-section{background:linear-gradient(135deg,#12162a,#0a0f1c);border-radius:28px;padding:20px;margin-bottom:30px;border:1px solid rgba(231,76,60,0.2)}
.section-title{font-family:'Unbounded',sans-serif;font-size:22px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.flip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.flip-card{background:transparent;height:240px;perspective:1000px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;text-align:center;transition:transform 0.5s;transform-style:preserve-3d;border-radius:20px}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:16px;overflow-y:auto}
.flip-front{background:linear-gradient(135deg,#1a1f35,#11172b);border:1px solid rgba(255,255,255,0.1)}
.flip-back{background:linear-gradient(135deg,#e74c3c20,#c0392b20);border:1px solid #e74c3c;transform:rotateY(180deg);font-size:13px;line-height:1.6;text-align:left;justify-content:flex-start}
.flip-front h4{font-size:20px;margin-bottom:8px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;margin-top:20px}
.game-card{background:linear-gradient(135deg,#12162a,#181e35);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:24px;cursor:pointer;transition:all 0.25s ease;position:relative;overflow:hidden}
.game-card:hover{transform:translateY(-6px);border-color:var(--game-color);box-shadow:0 20px 35px rgba(0,0,0,0.5)}
.game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--game-color)}
.game-emoji{font-size:52px;margin-bottom:14px}
.game-name{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:800;margin-bottom:8px}
.game-desc{font-size:12px;color:#9aa8c9;margin-bottom:18px;line-height:1.4}
.game-xp{background:rgba(255,215,0,0.2);padding:4px 14px;border-radius:30px;font-size:13px;font-weight:700;color:#ffd700}
.leaderboard-table{width:100%;border-collapse:collapse}
.leaderboard-table th,.leaderboard-table td{padding:12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06)}
.leaderboard-table th{color:#ffd700;font-size:12px}
.rank-1 td:first-child{color:#ffd700;font-weight:800}
.game-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0c15e6;backdrop-filter:blur(8px);z-index:1000;flex-direction:column}
.game-modal.active{display:flex}
.game-header{background:#12162a;padding:18px 28px;display:flex;align-items:center;gap:20px;border-bottom:1px solid rgba(255,255,255,0.08)}
.close-game{background:none;border:none;font-size:38px;cursor:pointer;color:#8b93b8}
.game-stats{display:flex;gap:28px;font-size:15px}
.game-stats span{color:#ffd700;font-weight:800;font-size:26px;margin-left:6px}
.game-content{flex:1;padding:32px;overflow-y:auto;display:flex;justify-content:center;align-items:center}
.mcq-arena{max-width:950px;width:100%;background:rgba(18,22,42,0.85);border-radius:32px;padding:30px;border:1px solid rgba(231,76,60,0.4)}
.mcq-timer{font-family:'Unbounded',monospace;font-size:44px;font-weight:800;text-align:center;margin-bottom:15px;color:#ffd700}
.mcq-question{font-size:22px;font-weight:600;background:#0a0f1e;padding:28px;border-radius:24px;margin-bottom:28px;text-align:center;line-height:1.5}
.mcq-options{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin:20px 0}
.mcq-option{background:#11172b;border:2px solid rgba(255,255,255,0.08);border-radius:20px;padding:18px 12px;font-size:17px;font-weight:600;text-align:center;cursor:pointer;color:#ccd6f0;transition:all 0.07s linear}
.mcq-option.correct-feedback{background:#2ecc71;border-color:#00e5a8;color:white}
.mcq-option.wrong-feedback{background:#e84393;border-color:#ff5e9e;color:white}
.mcq-progress{text-align:center;font-size:18px;color:#8b93b8;margin-top:20px;font-weight:600}
.result-screen{text-align:center;background:#12162a;padding:50px;border-radius:40px}
.result-emoji{font-size:80px;margin-bottom:20px}
.result-score{font-size:48px;font-weight:900;color:#ffd700;margin:20px}
@media (max-width:768px){.sidebar{display:none}.main-content{margin-left:0}.mcq-options{grid-template-columns:1fr}.mcq-question{font-size:18px}}
</style>
</head>
<body>

<div class="dashboard-container">
  <div class="sidebar">
    <div class="sidebar-header"><div class="sidebar-logo">🦁</div><div><div class="sidebar-title" style="font-weight:800">VNG LearnZoo</div><div class="user-grade" style="font-size:12px">Grade 9 • INSANE</div></div></div>
    <div class="user-info"><div class="user-avatar">👨‍🎓</div><div class="user-name" id="userName">ARJUN</div><div><div><span class="stat-value" id="xpValue">0</span> XP</div><div><span class="stat-value" id="gamesValue">0</span> Games</div></div></div>
    <div class="nav-item active" onclick="showDashboard()">📊 Dashboard</div>
    <div class="nav-item" onclick="showPlay2Learn()">🎮 Play2Learn</div>
    <div class="nav-item" onclick="showTheory()">📚 Theory</div>
    <div class="nav-item" onclick="showLeaderboard()">🏆 Leaderboard</div>
    <div class="logout-btn" onclick="logout()">🚪 Log Out</div>
  </div>
  <div class="main-content">
    <div class="top-bar"><div class="page-title">⚡ GRADE 9 • INSANE MODE ⚡</div><div class="streak-badge" id="streakBadge">🔥 0 Day Streak</div></div>
    <div id="contentArea"></div>
  </div>
</div>

<div class="game-modal" id="gameModal">
  <div class="game-header"><button class="close-game" onclick="closeGame()">×</button><div class="game-info"><h2 id="gameTitle">GAME</h2><div class="game-stats">🏆 SCORE: <span id="gameScore">0</span> &nbsp;| ⏱️ TIME: <span id="gameTimer">00</span>s</div></div></div>
  <div class="game-content" id="gameContent"></div>
</div>

<!-- API Service and Game Library -->
<script src="api.js"></script>
<script src="game-library.js"></script>
<script>
// ==================== GLOBAL STATE ====================
let totalXP = 0, gamesPlayed = 0, streak = 0;
let weeklyActivity = [25, 32, 28, 40, 45, 38, 30];
let currentGame = null, activeGameState = null, timerInterval = null;

// ==================== BUILD GAMES FROM LIBRARY (Grade 9) ====================
const GRADE = 9;
const gradeData = GAME_LIBRARY[GRADE];
const GAMES = {};

for (let subjectKey in gradeData) {
  const subject = gradeData[subjectKey];
  subject.games.forEach(game => {
    const content = GAME_CONTENT[game.id];
    GAMES[game.id] = {
      id: game.id,
      name: game.name,
      desc: game.desc,
      emoji: subject.icon,
      xp: game.xp,
      color: subject.color,
      questions: content.questions
    };
  });
}

// ==================== FLIP THEORY ====================
const flipNotes = [
  { front: "🏎️ Kinematics", back: "v = u + at, s = ut + ½at², v² = u² + 2as. Average velocity = (u+v)/2. Displacement = area under v-t graph." },
  { front: "🍎 Newton's Laws", back: "1st: Inertia. 2nd: F = ma. 3rd: Action-reaction. Impulse = change in momentum = F×t." },
  { front: "⚡ Electricity", back: "Ohm's Law: V = IR. Series: R = R₁+R₂. Parallel: 1/R = 1/R₁+1/R₂. Power P = VI = I²R = V²/R." },
  { front: "💪 Work & Energy", back: "W = F·d·cosθ. KE = ½mv². PE = mgh. Power = W/t = Fv. Conservation of energy." },
  { front: "🔢 Polynomials", back: "Remainder Theorem: p(a) = remainder. Factor Theorem: (x-a) is factor if p(a)=0. Sum of roots = -b/a, product = c/a." },
  { front: "🎯 Quadratics", back: "ax²+bx+c=0. Δ = b²-4ac. Δ>0: 2 real roots, Δ=0: 1 real, Δ<0: no real. Roots = [-b ± √Δ]/2a." },
  { front: "📍 Coordinate Geometry", back: "Distance = √[(x₂-x₁)²+(y₂-y₁)²]. Midpoint = ((x₁+x₂)/2, (y₁+y₂)/2). Slope m = (y₂-y₁)/(x₂-x₁)." },
  { front: "📐 Trigonometry", back: "sinθ = opp/hyp, cosθ = adj/hyp, tanθ = opp/adj. sin²θ+cos²θ=1, 1+tan²θ=sec²θ, 1+cot²θ=csc²θ." },
  { front: "📜 Poetry", back: "Rhyme scheme: AABB, ABAB, ABCB. Meter: iambic (unstressed-stressed). Figures: simile, metaphor, personification, hyperbole." },
  { front: "💬 Famous Quotes", back: "Shakespeare: 'To be or not to be', 'A rose by any other name'. Orwell: 'All animals are equal...'. Dickens: 'Best of times, worst of times'." },
  { front: "🎭 Characters", back: "Hamlet (prince of Denmark), Macbeth (Scottish general), Othello (Moor), Lear (king), Romeo (lover), Antonio (merchant)." },
  { front: "🌀 Plot Structure", back: "Exposition → Rising Action → Climax → Falling Action → Resolution. Conflict drives the story." },
  { front: "📖 Tamil Yaappu", back: "மோனை (initial sound), எதுகை (second sound), இயைபு (ending sound), அந்தாதி (linking). அணிகள்: உவமை, உருவகம், தற்குறிப்பேற்றம்." },
  { front: "💬 Tamil Quotes", back: "புறநானூறு: 'யாதும் ஊரே'. திருக்குறள்: 'கற்க கசடற'. பாரதியார்: 'செந்தமிழ் நாடு'. ஆத்திசூடி: 'அறம் செய்ய விரும்பு'." },
  { front: "📖 Tamil Literature", back: "Silappadikaram: Kannagi story. Manimekalai: Buddhist story. Thirukkural: 1330 couplets. Kamba Ramayanam: Tamil Ramayana." }
];

// ==================== API DATA LOADING ====================
async function loadUserData() {
  try {
    const user = await API.getUserProfile();
    totalXP = user.xp || 0;
    streak = user.streak || 0;
    gamesPlayed = user.gamesPlayed || 0;
    document.getElementById('userName').textContent = user.name || 'Student';
    
    const savedActivity = localStorage.getItem(`weeklyActivity_${GRADE}`);
    if (savedActivity) weeklyActivity = JSON.parse(savedActivity);
    
    updateStats();
  } catch (error) {
    console.error('Failed to load user data from API:', error);
    const saved = localStorage.getItem('grade9_data');
    if (saved) {
      let d = JSON.parse(saved);
      totalXP = d.xp || 0;
      gamesPlayed = d.games || 0;
      streak = d.streak || 0;
      weeklyActivity = d.activity || weeklyActivity;
    }
    updateStats();
  }
}

function updateStats() {
  document.getElementById('xpValue').textContent = totalXP;
  document.getElementById('gamesValue').textContent = gamesPlayed;
  document.getElementById('streakBadge').innerHTML = `🔥 ${streak} Day Streak`;
  localStorage.setItem('grade9_data', JSON.stringify({
    xp: totalXP, games: gamesPlayed, streak: streak, activity: weeklyActivity
  }));
}

async function addXP(amt) {
  totalXP += amt;
  updateStats();
  try {
    await API.updateUserProfile({ xp: totalXP });
  } catch (e) {
    console.warn('Sync XP failed:', e);
  }
}

// ==================== SECTION RENDERING ====================
function showDashboard() {
  setActiveNav('Dashboard');
  const level = Math.floor(totalXP / 600) + 9;
  const percent = (totalXP % 600) / 600 * 100;
  const maxAct = Math.max(...weeklyActivity, 1);
  const barsHtml = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((day,i)=>`
    <div class="activity-day"><div class="activity-bar"><div class="activity-fill" style="height: ${(weeklyActivity[i]/maxAct)*50}px"></div></div><div class="activity-label">${day}</div></div>
  `).join('');
  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-value">4</div><div class="stat-label">Subjects</div></div>
      <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-value">Lv ${level}</div><div class="stat-label">Explorer Rank</div></div>
      <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-value">#5</div><div class="stat-label">Class Rank</div></div>
    </div>
    <div class="progress-section">
      <div class="progress-header"><span class="progress-title">LEVEL PROGRESS</span><span class="progress-stats">${totalXP} / ${level*600} XP to Lv ${level+1}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
      <div class="weekly-activity"><div class="weekly-title">WEEKLY ACTIVITY</div><div class="activity-bars">${barsHtml}</div></div>
    </div>
    <div class="notes-section"><div class="section-title">🔥 ACHIEVEMENTS</div><div>${gamesPlayed} games • ${streak} day streak • Level ${level}</div></div>
  `;
  document.getElementById('contentArea').innerHTML = html;
}

function showPlay2Learn() {
  setActiveNav('Play2Learn');
  let html = `<div class="section-title">🎮 PLAY2LEARN - GRADE 9 INSANE</div><div class="games-grid">`;
  for (let id in GAMES) {
    let g = GAMES[id];
    html += `<div class="game-card" style="--game-color:${g.color}" onclick="startGame('${id}')">
      <div class="game-emoji">${g.emoji}</div>
      <div class="game-name">${g.name}</div>
      <div class="game-desc">${g.desc}</div>
      <div class="game-xp">+${g.xp} XP</div>
    </div>`;
  }
  html += `</div>`;
  document.getElementById('contentArea').innerHTML = html;
}

function showTheory() {
  setActiveNav('Theory');
  let html = `<div class="notes-section"><div class="section-title">📘 FLIP THEORY (Tap to flip)</div><div class="flip-grid">`;
  flipNotes.forEach(note => {
    html += `<div class="flip-card" onclick="this.classList.toggle('flipped')"><div class="flip-inner"><div class="flip-front"><h4>📌 ${note.front}</h4></div><div class="flip-back">${note.back}</div></div></div>`;
  });
  html += `</div></div>`;
  document.getElementById('contentArea').innerHTML = html;
}

async function showLeaderboard() {
  setActiveNav('Leaderboard');
  let html = `<div class="notes-section"><div class="section-title">🏆 GRADE 9 LEADERBOARD</div><table class="leaderboard-table"><tr><th>Rank</th><th>Student</th><th>XP</th></tr>`;
  try {
    const leaders = await API.getLeaderboard(9);
    leaders.forEach((s, i) => {
      html += `<tr class="${i===0?'rank-1':''}"><td>${i+1}</td><td>${s.name}</td><td>${s.xp}</td></tr>`;
    });
  } catch (e) {
    const students = [{name:"Arjun", xp:totalXP},{name:"Priya", xp:5100},{name:"Ravi", xp:3950},{name:"Meena", xp:6200},{name:"Kavin", xp:3400}].sort((a,b)=>b.xp-a.xp);
    students.forEach((s,i)=> { html+=`<tr class="${i===0?'rank-1':''}"><td>${i+1}</td><td>${s.name}</td><td>${s.xp}</td></tr>`; });
  }
  html += `</table></div>`;
  document.getElementById('contentArea').innerHTML = html;
}

function setActiveNav(section) {
  const map = {'Dashboard':0,'Play2Learn':1,'Theory':2,'Leaderboard':3};
  document.querySelectorAll('.nav-item').forEach((item,idx)=> item.classList.toggle('active', idx===map[section]));
}

// ==================== GAME ENGINE (with API submission) ====================
function startGame(gameId) {
  currentGame = GAMES[gameId];
  if (!currentGame) { console.error("Game not found:", gameId); return; }
  document.getElementById('gameTitle').innerHTML = currentGame.name;
  document.getElementById('gameModal').classList.add('active');
  document.getElementById('gameScore').textContent = '0';
  if (activeGameState && activeGameState.timerInterval) clearInterval(activeGameState.timerInterval);
  activeGameState = {
    score: 0,
    qIndex: 0,
    questions: [...currentGame.questions],
    timeLeft: 70,
    canAnswer: true,
    timerInterval: null
  };
  updateGameScoreDisplay();
  startMCQGame();
}

function startMCQGame() {
  if (!activeGameState) return;
  if (activeGameState.timeLeft <= 0 || activeGameState.qIndex >= activeGameState.questions.length) {
    endMCQGame();
    return;
  }
  if (activeGameState.timerInterval) clearInterval(activeGameState.timerInterval);
  activeGameState.canAnswer = true;
  activeGameState.timeLeft = 70;
  document.getElementById('gameTimer').textContent = activeGameState.timeLeft;
  activeGameState.timerInterval = setInterval(() => {
    if (activeGameState) {
      activeGameState.timeLeft--;
      document.getElementById('gameTimer').textContent = activeGameState.timeLeft;
      if (activeGameState.timeLeft <= 0) {
        clearInterval(activeGameState.timerInterval);
        endMCQGame();
      }
    }
  }, 1000);
  renderCurrentQuestion();
}

function renderCurrentQuestion() {
  if (!activeGameState || activeGameState.qIndex >= activeGameState.questions.length) return;
  const q = activeGameState.questions[activeGameState.qIndex];
  const shuffled = [...q.options].sort(() => Math.random() - 0.5);
  document.getElementById('gameContent').innerHTML = `
    <div class="mcq-arena">
      <div class="mcq-timer">⏱️ ${activeGameState.timeLeft}s</div>
      <div class="mcq-question">${q.text}</div>
      <div class="mcq-options" id="mcqOptions">
        ${shuffled.map(opt => `<div class="mcq-option" data-value="${opt.replace(/"/g,'&quot;')}">${opt}</div>`).join('')}
      </div>
      <div class="mcq-progress">🔥 Q${activeGameState.qIndex+1}/${activeGameState.questions.length}</div>
    </div>
  `;
  document.querySelectorAll('.mcq-option').forEach(opt => {
    opt.addEventListener('click', function handler(e) {
      if (!activeGameState.canAnswer) return;
      const selected = this.dataset.value;
      const isCorrect = (selected === q.correct);
      if (isCorrect) {
        activeGameState.score += 25;
        showFeedback(`✅ CORRECT! +25 XP`, '#2ecc71');
        this.classList.add('correct-feedback');
      } else {
        showFeedback(`❌ WRONG! Answer: ${q.correct}. ${q.explanation}`, '#e84393');
        this.classList.add('wrong-feedback');
      }
      activeGameState.canAnswer = false;
      updateGameScoreDisplay();
      setTimeout(() => {
        activeGameState.qIndex++;
        if (activeGameState.qIndex < activeGameState.questions.length) {
          startMCQGame();
        } else {
          endMCQGame();
        }
      }, 1000);
      this.removeEventListener('click', handler);
    });
  });
}

function updateGameScoreDisplay() {
  if (activeGameState) document.getElementById('gameScore').textContent = activeGameState.score;
}

async function endMCQGame() {
  if (activeGameState && activeGameState.timerInterval) clearInterval(activeGameState.timerInterval);
  let earnedXP = Math.floor(currentGame.xp * (0.3 + Math.min(0.7, activeGameState.score / (activeGameState.questions.length * 25))));
  
  try {
    const result = await API.submitGameResult(currentGame.id, activeGameState.score, earnedXP);
    totalXP = result.xp;
    streak = result.streak;
    gamesPlayed = result.gamesPlayed || (gamesPlayed + 1);
  } catch (error) {
    console.error('Failed to submit game result:', error);
    totalXP += earnedXP;
    streak++;
    gamesPlayed++;
  }
  
  const today = new Date().getDay();
  const dayIndex = today === 0 ? 6 : today - 1;
  weeklyActivity[dayIndex] = (weeklyActivity[dayIndex] || 0) + 1;
  localStorage.setItem(`weeklyActivity_${GRADE}`, JSON.stringify(weeklyActivity));
  
  updateStats();
  
  document.getElementById('gameContent').innerHTML = `
    <div class="result-screen">
      <div class="result-emoji">${activeGameState.score >= 100 ? '🏆🔥 INSANE MASTER' : '📚 CHALLENGE COMPLETE'}</div>
      <div class="result-score">+${earnedXP} XP</div>
      <div>🏅 SCORE: ${activeGameState.score}/${activeGameState.questions.length * 25}</div>
      <button style="margin-top:25px; background:#e74c3c; border:none; padding:14px 32px; border-radius:40px; font-weight:bold; color:white; cursor:pointer" onclick="closeGame()">PLAY MORE →</button>
    </div>
  `;
  activeGameState = null;
}

function showFeedback(msg, color) {
  let fb = document.createElement('div');
  fb.textContent = msg;
  fb.style.position = 'fixed';
  fb.style.top = '30%';
  fb.style.left = '50%';
  fb.style.transform = 'translate(-50%, -50%)';
  fb.style.background = color;
  fb.style.color = 'white';
  fb.style.padding = '16px 28px';
  fb.style.borderRadius = '50px';
  fb.style.fontWeight = 'bold';
  fb.style.zIndex = '2000';
  fb.style.fontSize = '20px';
  document.body.appendChild(fb);
  setTimeout(() => fb.remove(), 800);
}

function closeGame() {
  if (activeGameState && activeGameState.timerInterval) clearInterval(activeGameState.timerInterval);
  document.getElementById('gameModal').classList.remove('active');
  activeGameState = null;
  showPlay2Learn();
}

function logout() {
  API.logout();
}

// ==================== INITIALIZE ====================
loadUserData().then(() => showDashboard());
</script>
</body>
</html>
