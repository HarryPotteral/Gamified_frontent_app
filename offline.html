<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Offline - VNG LearnZoo</title>
<link rel="stylesheet" href="shared.css">
<style>
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 24px;
}
.offline-card {
  background: var(--card);
  border: 1px solid var(--bdr2);
  border-radius: 24px;
  padding: 48px 32px;
  max-width: 400px;
  margin: 0 auto;
}
.offline-icon {
  font-size: 80px;
  margin-bottom: 24px;
}
.offline-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 12px;
}
.offline-text {
  color: var(--soft);
  margin-bottom: 32px;
  line-height: 1.6;
}
.retry-btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 16px;
}
.saved-games {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--bdr);
}
</style>
</head>
<body>
<div class="offline-card">
  <div class="offline-icon">📡</div>
  <h1 class="offline-title">You're Offline</h1>
  <p class="offline-text">Don't worry! Your saved games and progress are available offline. Connect to the internet to sync your progress.</p>
  <button class="retry-btn" onclick="location.reload()">🔄 Try Again</button>
  <div class="saved-games">
    <div style="font-weight: 700; margin-bottom: 12px;">🎮 Available Offline:</div>
    <div style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
      <span class="chip chip-grade">Math Games</span>
      <span class="chip chip-grade">Science Games</span>
      <span class="chip chip-grade">Tamil Games</span>
      <span class="chip chip-grade">English Games</span>
    </div>
  </div>
</div>
<script>
// Check if online and redirect
window.addEventListener('online', () => {
  window.location.href = '/';
});
</script>
</body>
</html>
